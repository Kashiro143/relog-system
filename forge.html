<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>K-OS // LA FORGE (ADMIN)</title>
    <style>
        :root { --neon: #00d4ff; --bg: #0a0a0a; --panel: #111; }
        body { background: var(--bg); color: #ccc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { color: var(--neon); border-bottom: 2px solid var(--neon); padding-bottom: 10px; font-style: italic; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 8px; }
        h3 { color: var(--neon); margin-top: 0; text-transform: uppercase; font-size: 0.9em; letter-spacing: 2px; }
        
        input, select, button { 
            width: 100%; padding: 10px; margin: 10px 0; 
            background: #000; border: 1px solid #444; color: white; border-radius: 4px;
        }
        button { 
            background: var(--neon); color: black; font-weight: bold; 
            cursor: pointer; border: none; transition: 0.3s; 
        }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
        
        .list-item { 
            background: #1a1a1a; padding: 10px; margin: 5px 0; 
            border-left: 3px solid var(--neon); display: flex; justify-content: space-between;
        }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <h1>K-OS // SYSTEM_FORGE_V1</h1>

    <div class="grid">
        <div class="card">
            <h3>👥 GESTION DES ACTEURS</h3>
            <input type="text" id="user-id" placeholder="ID Unique (ex: Saitho)">
            <input type="text" id="user-name" placeholder="Nom d'affichage">
            <input type="color" id="user-color" value="#00d4ff">
            
            <div style="font-size: 0.8em; margin: 10px 0;">
                <label><input type="checkbox" id="p-mode" checked> Peut changer de mode</label><br>
                <label><input type="checkbox" id="p-sound"> Accès Soundboard</label>
            </div>

            <button onclick="forgeUser()">CRÉER L'ACTEUR</button>
            
            <div id="display-users">
                </div>
        </div>

        <div class="card">
            <h3>🌍 GESTION DES UNIVERS (MODES)</h3>
            <input type="text" id="mode-id" placeholder="ID du Mode (ex: pokemmo)">
            <input type="text" id="mode-label" placeholder="Nom du Mode (ex: PokéMMO Nuzlocke)">
            <input type="text" id="mode-overlay" placeholder="Lien Overlay (/modules/...)">
            <input type="text" id="mode-player" placeholder="Lien Player (/modules/...)">

            <button onclick="forgeMode()">FORGER LE MODE</button>

            <div id="display-modes">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { firebaseConfig } from "./config.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- FONCTION : CRÉER UN JOUEUR ---
        window.forgeUser = () => {
            const id = document.getElementById('user-id').value;
            if(!id) return alert("ID requis !");

            set(ref(db, `registry/users/${id}`), {
                id: id,
                name: document.getElementById('user-name').value || id,
                color: document.getElementById('user-color').value,
                permissions: {
                    can_change_mode: document.getElementById('p-mode').checked,
                    can_use_soundboard: document.getElementById('p-sound').checked
                },
                currentMode: "default",
                status: "offline"
            });
            alert("Joueur forgé !");
        };

        // --- FONCTION : CRÉER UN MODE ---
        window.forgeMode = () => {
            const id = document.getElementById('mode-id').value;
            if(!id) return alert("ID requis !");

            set(ref(db, `registry/modes/${id}`), {
                id: id,
                label: document.getElementById('mode-label').value,
                overlayUrl: document.getElementById('mode-overlay').value,
                playerUrl: document.getElementById('mode-player').value
            });
            alert("Mode forgé !");
        };

        // --- AFFICHAGE TEMPS RÉEL ---
        onValue(ref(db, 'registry/users'), (snap) => {
            const data = snap.val();
            const cont = document.getElementById('display-users');
            cont.innerHTML = "";
            for(let id in data) {
                cont.innerHTML += `<div class="list-item">
                    <span><span class="dot" style="background:${data[id].color}"></span>${id}</span>
                    <button style="width:auto; padding:2px 5px; background:red;" onclick="deleteItem('users/${id}')">X</button>
                </div>`;
            }
        });

        onValue(ref(db, 'registry/modes'), (snap) => {
            const data = snap.val();
            const cont = document.getElementById('display-modes');
            cont.innerHTML = "";
            for(let id in data) {
                cont.innerHTML += `<div class="list-item">
                    <span>${data[id].label}</span>
                    <button style="width:auto; padding:2px 5px; background:red;" onclick="deleteItem('modes/${id}')">X</button>
                </div>`;
            }
        });

        window.deleteItem = (path) => { if(confirm("Supprimer ?")) remove(ref(db, `registry/${path}`)); };
    </script>
</body>
</html>
