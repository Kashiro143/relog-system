<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Courier New', monospace; }
        #glitch-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 20, 0, 0.8); border: 4px solid #00ff00; box-sizing: border-box;
            justify-content: center; align-items: center; flex-direction: column;
            color: #00ff00; text-shadow: 0 0 10px #00ff00; z-index: 9999;
        }
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 0, 0.2); position: absolute; animation: scan 3s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .glitch-text { font-size: 3rem; font-weight: bold; letter-spacing: 5px; text-align: center; }
    </style>
</head>
<body>
    <div id="glitch-screen">
        <div class="scanline"></div>
        <div class="glitch-text">[RE:Log_INJECTION]<br>SYSTEM_OVERRIDE</div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6KWfJaMKOyy8KzJCRS6Went1vx_4S_MQ",
        authDomain: "relog-system.firebaseapp.com",
        databaseURL: "https://relog-system-default-rtdb.europe-west1.firebasedatabase.app/", // URL AJOUTÉE
        projectId: "relog-system",
        storageBucket: "relog-system.firebasestorage.app",
        messagingSenderId: "869109824129",
        appId: "1:869109824129:web:98565e8e25708461ef6b80"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const currentUser = urlParams.get('user') || 'GUEST';

    onValue(ref(db, 'commands'), (snapshot) => {
        const data = snapshot.val();
        if (data && (data.target === currentUser || data.target === "ALL")) {
            const screen = document.getElementById('glitch-screen');
            screen.style.display = 'flex';
            setTimeout(() => { screen.style.display = 'none'; }, 3000);
        }
    });
</script>
</body>
</html>
