<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>K-OS // STREAM_OVERLAY</title>
    <style>
        /* L'overlay doit être invisible par défaut (fond transparent) */
        body, html { 
            margin: 0; padding: 0; 
            width: 1920px; height: 1080px; 
            background: transparent; 
            overflow: hidden; 
        }

        #module-container {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* Debug info (uniquement visible si on n'est pas dans OBS) */
        #debug-info {
            position: absolute; bottom: 10px; right: 10px;
            color: rgba(255,255,255,0.2); font-size: 10px; font-family: monospace;
        }
    </style>
</head>
<body data-role="overlay">

    <iframe id="module-container" src="about:blank" allowtransparency="true"></iframe>

    <div id="debug-info">K-OS_CORE_ACTIVE</div>

    <script type="module" src="core.js"></script>
</body>
</html>
