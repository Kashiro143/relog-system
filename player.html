<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>K-OS // Player Terminal</title>
    <style>
        body {
            background: #000;
            color: #00d4ff;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-slot {
            background: #051a24;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-slot.active {
            background: #440000;
            border-color: #ff0055;
            color: #fff;
        }

        input {
            background: #111;
            border: 1px solid #00d4ff;
            color: #fff;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h2 id="name-tag">UNITÉ</h2>

    <div id="quiz-section"
        style="display:none; background: rgba(0, 212, 255, 0.1); border: 2px solid #00d4ff; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
        <h3 style="color: #ffaa00; margin-top: 0; font-size: 0.8rem;">[ ALERTE : QUESTION ENTRANTE ]</h3>
        <p id="question-text" style="font-size: 1.3rem; font-weight: bold; color: white; margin: 10px 0;"></p>
        <input type="text" id="player-response-input" placeholder="Tapez votre réponse ici..."
            style="width: 100%; padding: 10px; background: #000; border: 1px solid #00d4ff; color: white;">
        <button onclick="sendResponse()"
            style="margin-top: 10px; width: 100%; padding: 12px; background: #00d4ff; color: #000; border: none; font-weight: bold; cursor: pointer;">TRANSMETTRE
            RÉPONSE</button>
    </div>

    <div class="grid" id="slots-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { firebaseConfig } from './config.js';

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const user = new URLSearchParams(window.location.search).get('user') || "GUEST";
        document.getElementById('name-tag').innerText = "UNITÉ : " + user.toUpperCase();

        // --- GESTION DU QUIZZ (Correction) ---
        onValue(ref(db, 'pokemmo/quizz'), (snap) => {
            const quiz = snap.val();
            const section = document.getElementById('quiz-section');
            const qText = document.getElementById('question-text');

            if (quiz && quiz.active === true && quiz.question) {
                qText.innerText = quiz.question;
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
                document.getElementById('player-response-input').value = ""; // Reset champ
            }
        });

        window.sendResponse = () => {
            const input = document.getElementById('player-response-input');
            const text = input.value;
            if (text.trim() !== "") {
                // On envoie la réponse sous le nom de l'utilisateur
                set(ref(db, `pokemmo/quizz/responses/${user}`), text)
                    .then(() => {
                        alert("Réponse envoyée au système !");
                        input.value = "";
                    });
            }
        };
        // --- GESTION DES SLOTS ---
        onValue(ref(db, `pokemmo/slots/${user}`), (snap) => {
            const data = snap.val() || {};
            const container = document.getElementById('slots-container');
            container.innerHTML = "";
            const labels = ["OK", "MORT 1", "MORT 2", "PERMA"];
            for (let i = 1; i <= 6; i++) {
                const count = data[i] ? data[i].deathCount : 0;
                const activeClass = count > 0 ? 'active' : '';
                container.innerHTML += `<button class="btn-slot ${activeClass}" onclick="toggleMySlot(${i})">SLOT ${i}<br>${labels[count]}</button>`;
            }
        });

        window.toggleMySlot = (num) => {
            const slotRef = ref(db, `pokemmo/slots/${user}/${num}`);
            const DEATH_TIMERS = [600, 1200];
            get(slotRef).then(s => {
                let current = s.val() || { deathCount: 0 };
                let next = (current.deathCount + 1) % 4;
                set(slotRef, {
                    deathCount: next,
                    timestamp: Date.now(),
                    type: next === 3 ? "PERMA" : next > 0 ? "TEMP" : "ALIVE",
                    duration: next === 1 ? 600 : next === 2 ? 1200 : 0
                });
            });
        };
    </script>
</body>

</html>
